<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Task Report</title>

    <style>
      body {
        font-family: Arial, sans-serif;
      }
      
      h1 {
        text-align: center;
        margin-bottom: 20px;
      }
      
      table {
        width: 100%;
        border-collapse: collapse;
      }
      
      th,
      td {
        border: 1px solid #ddd;
        padding: 8px;
      }
      
      th {
        background-color: #f2f2f2;
      }
      
      .footer {
        margin-top: 30px;
        font-size: 12px;
        text-align: right;
      }
    </style>
  </head>

  <body>
    <h1>Task Report</h1>

    <p>User: {{ user.email }}</p>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Title</th>
          <th>Status</th>
          <th>Created</th>
        </tr>
      </thead>

      <tbody>
        {% for task in tasks %}
          <tr>
            <td>{{ task.id }}</td>
            <td>{{ task.title }}</td>
            <td>{{ task.status }}</td>
            <td>{{ task.created_at }}</td>
          </tr>
        {% endfor %}
      </tbody>
    </table>

    <div class="footer">Generated at: {{ generated_at }}</div>
  </body>
</html>
