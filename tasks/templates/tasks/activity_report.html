<!DOCTYPE html>
<html>
<head>
<style>

body{
    font-family: Arial;
}

h2{
    text-align:center;
}

table{
    width:100%;
    border-collapse: collapse;
    margin-top:20px;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
}

th{
    background:#f2f2f2;
}

</style>
</head>

<body>

<h2>User Activity Report</h2>

<p><strong>User:</strong> {{ user.username }}</p>

<table>

<thead>
<tr>
<th>ID</th>
<th>Action</th>
<th>Task</th>
<th>Timestamp</th>
</tr>
</thead>

<tbody>

{% for log in logs %}

<tr>
<td>{{ log.id }}</td>
<td>{{ log.action }}</td>
<td>{{ log.task }}</td>
<td>{{ log.timestamp }}</td>
</tr>

{% empty %}

<tr>
<td colspan="4">No activity logs found</td>
</tr>

{% endfor %}

</tbody>

</table>

</body>
</html>
