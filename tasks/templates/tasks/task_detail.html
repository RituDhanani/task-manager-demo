<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">

    <style>

        body{
            font-family: Arial, sans-serif;
        }

        h2{
            text-align:center;
        }

        table{
            width:100%;
            border-collapse: collapse;
            margin-top:20px;
        }

        th, td{
            border:1px solid #ddd;
            padding:10px;
            text-align:left;
        }

        th{
            background:#f5f5f5;
        }

    </style>

</head>

<body>

<h2>Task Detail Report</h2>

<table>

<tr>
<th>Task ID</th>
<td>{{ task.id }}</td>
</tr>

<tr>
<th>Title</th>
<td>{{ task.title }}</td>
</tr>

<tr>
<th>Description</th>
<td>{{ task.description }}</td>
</tr>

<tr>
<th>Status</th>
<td>{{ task.status }}</td>
</tr>

<tr>
<th>Priority</th>
<td>{{ task.priority }}</td>
</tr>

<tr>
<th>Due Date</th>
<td>{{ task.due_date }}</td>
</tr>

<tr>
<th>Assigned To</th>
<td>{{ task.assigned_to }}</td>
</tr>

<tr>
<th>Created By</th>
<td>{{ task.created_by }}</td>
</tr>

<tr>
<th>Created At</th>
<td>{{ task.created_at }}</td>
</tr>

</table>

</body>
</html>
